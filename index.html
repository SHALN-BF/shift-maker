フィラメント切れ<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>シフト文 自動生成</title>
  <style>
    body { font-family: sans-serif; max-width: 960px; margin: 24px auto; padding: 0 16px 32px; line-height: 1.6; background: #f7f7f7; color: #222; }
    h1 { font-size: 24px; margin-bottom: 8px; }
    .desc { color: #555; margin-bottom: 20px; }
    .card { background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .row { display: grid; grid-template-columns: 80px 160px 1fr 1fr 110px; gap: 12px; align-items: center; }
    @media (max-width: 720px) { .row { grid-template-columns: 1fr; } }
    label { font-weight: bold; }
    input[type="date"], select, button { font-size: 16px; padding: 8px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
    select, input[type="date"] { width: 100%; }
    .unavailable-btn { padding: 8px 12px; background: #e74c3c; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; white-space: nowrap; }
    .unavailable-btn.active { background: #999; color: #fff; }
    .output-box { background: #fff; border-radius: 12px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); margin-top: 20px; }
    textarea { width: 100%; min-height: 260px; resize: vertical; padding: 12px; border-radius: 8px; border: 1px solid #ccc; }
    .buttons { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
    button { padding: 10px 16px; border: none; border-radius: 8px; cursor: pointer; background: #2d6cdf; color: white; }
    button.secondary { background: #666; }
    .hint { font-size: 13px; color: #666; margin-top: 8px; }
  </style>
</head>
<body>
  <h1>シフト文 自動生成</h1>
  <p class="desc">次の週のシフトを自動設定 + Cookie保存 + 出勤不可対応</p>

  <div style="margin-bottom: 16px; background:#fff; padding:12px; border-radius:8px;">
    <label>基準日（変更すると自動で全日付更新）: </label>
    <input type="date" id="baseDate" style="width: 180px;">
  </div>

  <div id="shiftForm"></div>

  <div class="output-box">
    <h2>生成結果</h2>
    <textarea id="output" readonly></textarea>
    <div class="buttons">
      <button id="copyBtn">📋 コピー</button>
      <button id="clearBtn" class="secondary">全部リセット</button>
    </div>
    <div class="hint">形式例: 6/28 日: 17:00~19:00　または　出勤不可</div>
  </div>

  <script>
    const days = [
      { key: "sun", label: "日" },
      { key: "mon", label: "月" },
      { key: "tue", label: "火" },
      { key: "wed", label: "水" },
      { key: "thu", label: "木" },
      { key: "fri", label: "金" },
      { key: "sat", label: "土" }
    ];

    const form = document.getElementById("shiftForm");
    const output = document.getElementById("output");
    const baseDateInput = document.getElementById("baseDate");

    function generateTimeOptions(isWeekend) {
      const times = [];
      const startHour = isWeekend ? 7 : 10;   // 土日=7時〜　平日=10時〜
      for (let h = startHour; h <= 21; h++) {
        for (let m = 0; m < 60; m += 30) {
          times.push(`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`);
        }
      }
      return times;
    }

    function createTimeSelect(className, isWeekend) {
      const select = document.createElement("select");
      select.className = className;

      const empty = document.createElement("option");
      empty.value = ""; empty.textContent = "--:--";
      select.appendChild(empty);

      const times = generateTimeOptions(isWeekend);
      times.forEach(t => {
        const opt = document.createElement("option");
        opt.value = t; opt.textContent = t;
        select.appendChild(opt);
      });
      return select;
    }

    function createDayCard(day) {
      const card = document.createElement("div");
      card.className = "card";
      card.dataset.day = day.label;

      const row = document.createElement("div");
      row.className = "row";

      const dayLabel = document.createElement("label");
      dayLabel.textContent = `${day.label}曜`;

      const dateInput = document.createElement("input");
      dateInput.type = "date";
      dateInput.className = "date-input";

      // 土日かどうか（初期値）
      const isWeekend = (day.key === "sun" || day.key === "sat");

      const startSelect = createTimeSelect("start-time", isWeekend);
      const endSelect = createTimeSelect("end-time", isWeekend);

      const unavailableBtn = document.createElement("button");
      unavailableBtn.className = "unavailable-btn";
      unavailableBtn.textContent = "出勤不可";
      unavailableBtn.dataset.active = "false";

      unavailableBtn.addEventListener("click", () => {
        const isActive = unavailableBtn.dataset.active === "true";
        unavailableBtn.dataset.active = !isActive;
        unavailableBtn.classList.toggle("active", !isActive);
        updateOutput();
      });

      row.append(dayLabel, dateInput, startSelect, endSelect, unavailableBtn);
      card.appendChild(row);
      form.appendChild(card);

      return { dateInput, startSelect, endSelect, unavailableBtn, isWeekend };
    }

    const dayCards = days.map(createDayCard);

    function setNextWeek(baseDateStr) {
      let base = baseDateStr ? new Date(baseDateStr) : new Date();
      base.setHours(0, 0, 0, 0);

      const currentDay = base.getDay();
      let daysToAdd = (8 - currentDay) % 7;     // ← あなたが「これで治った」と言ったバージョン
      if (daysToAdd === 0) daysToAdd = 7;

      const nextSunday = new Date(base);
      nextSunday.setDate(nextSunday.getDate() + daysToAdd);

      dayCards.forEach((card, i) => {
        const d = new Date(nextSunday);
        d.setDate(d.getDate() + i);
        card.dateInput.value = d.toISOString().slice(0, 10);
      });
    }

    function saveToCookie() {
      const data = {};
      dayCards.forEach(({ startSelect, endSelect, unavailableBtn }, i) => {
        const dayLabel = days[i].label;
        data[dayLabel] = {
          start: startSelect.value,
          end: endSelect.value,
          unavailable: unavailableBtn.dataset.active === "true"
        };
      });
      document.cookie = `shiftPrefs=${encodeURIComponent(JSON.stringify(data))}; max-age=31536000; path=/`;
    }

    function loadFromCookie() {
      const cookies = document.cookie.split(';');
      const shiftCookie = cookies.find(c => c.trim().startsWith('shiftPrefs='));
      if (!shiftCookie) return;
      try {
        const data = JSON.parse(decodeURIComponent(shiftCookie.split('=')[1]));
        dayCards.forEach(({ startSelect, endSelect, unavailableBtn }, i) => {
          const saved = data[days[i].label];
          if (saved) {
            startSelect.value = saved.start || "";
            endSelect.value = saved.end || "";
            if (saved.unavailable) {
              unavailableBtn.dataset.active = "true";
              unavailableBtn.classList.add("active");
            }
          }
        });
      } catch(e) {}
    }

    function formatDateToJP(dateValue) {
      if (!dateValue) return "";
      const d = new Date(dateValue);
      return `${d.getMonth()+1}/${d.getDate()}`;
    }

    function updateOutput() {
      const lines = [];
      dayCards.forEach(({ dateInput, startSelect, endSelect, unavailableBtn }, i) => {
        const dayLabel = days[i].label;

        if (unavailableBtn.dataset.active === "true") {
          const formattedDate = formatDateToJP(dateInput.value);
          lines.push(`${formattedDate} ${dayLabel}: 出勤不可`);
          return;
        }

        if (!dateInput.value || !startSelect.value || !endSelect.value) return;
        if (startSelect.value >= endSelect.value) return;

        const formattedDate = formatDateToJP(dateInput.value);
        lines.push(`${formattedDate} ${dayLabel}: ${startSelect.value}~${endSelect.value}`);
      });

      output.value = lines.join("\n");
    }

    document.addEventListener("input", () => { updateOutput(); saveToCookie(); });
    document.addEventListener("change", () => { updateOutput(); saveToCookie(); });

    baseDateInput.addEventListener("change", () => {
      setNextWeek(baseDateInput.value);
      updateOutput();
    });

    document.getElementById("copyBtn").addEventListener("click", async () => {
      if (!output.value) return alert("出力がありません");
      try {
        await navigator.clipboard.writeText(output.value);
        alert("✅ コピーしました！");
      } catch (e) {
        alert("コピーに失敗しました");
      }
    });

    document.getElementById("clearBtn").addEventListener("click", () => {
      if (!confirm("本当にすべてリセットしますか？")) return;
      dayCards.forEach(({ dateInput, startSelect, endSelect, unavailableBtn }) => {
        dateInput.value = "";
        startSelect.value = "";
        endSelect.value = "";
        unavailableBtn.dataset.active = "false";
        unavailableBtn.classList.remove("active");
      });
      updateOutput();
      saveToCookie();
    });

    function init() {
      const today = new Date().toISOString().slice(0,10);
      baseDateInput.value = today;
      loadFromCookie();
      setNextWeek(today);
      updateOutput();
    }

    window.onload = init;
  </script>
</body>
</html>
